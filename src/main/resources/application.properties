spring.application.name=task-list

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:tasklist}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:""}
spring.datasource.driver-class.name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.web.cors.allowed-origins: ${ALLOWED_ORIGINS}
spring.web.cors.allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
spring.web.cors.allowed-headers: "*"
spring.web.cors.allowed-credentials: true

app.jwt.issuer=${APP_JWT_ISSUER:tasklist}
app.jwt.key=${APP_JWT_KEY:tasklist}
app.jwt.duration=${APP_JWT_DURATION:24h}
